name: curriculum-planner

services:
  web:
    container_name: ${CONTAINER_NAME:-curriculum-planner-web}
    image: ${IMAGE_NAME:-curriculum-planner-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.server
    env_file:
      - ${ENV_FILE:-/srv/config/curriculum-planner/.env.prod}
    ports:
      - "127.0.0.1:${HOST_PORT:-8091}:8000"
    environment:
      DATABASE_URL: sqlite:///data/app.db
    volumes:
      - ${DATA_DIR:-/srv/data/curriculum-planner}:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8000/", timeout=5).read()
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
