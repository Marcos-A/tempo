name: tempo-preview

services:
  web:
    container_name: tempo-preview-web
    build: .
    command: python -m app.server
    env_file:
      - ${PREVIEW_ENV_FILE:-/srv/config/tempo/.env.preview}
    ports:
      - "127.0.0.1:${HOST_PORT:-8092}:8000"
    environment:
      DATABASE_URL: sqlite:///data/app.db
      WEB_CONCURRENCY: "1"
    volumes:
      - ${PREVIEW_DATA_DIR:-/srv/data/tempo-preview}:/app/data
