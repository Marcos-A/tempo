<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ (title or app_name) ~ (" | " ~ school_name if school_name else "") }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/img/tempo-favicon.svg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}?v=20260714a" />
  </head>
  <body>
    <!-- Shared layout used by both the teacher flow and the hidden admin area. -->
    <header class="site-header">
      <div class="container">
        <a class="brand" href="/">
          <img class="brand-mark" src="{{ url_for('static', path='/img/tempo-lockup-light-bg.svg') }}" alt="{{ app_name }}" />
          <span class="brand-tagline">{{ "Planificador curricular · " ~ school_name if school_name else "Planificador curricular" }}</span>
        </a>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
